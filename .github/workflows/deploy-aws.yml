name: Deploy Wallboard to AWS ECS

# Required PROD environment SECRETS (Settings → Environments → PROD → Secrets):
#   AWS_ACCESS_KEY_ID          — IAM deploy user access key
#   AWS_SECRET_KEY             — IAM deploy user secret key
#
# Required PROD environment VARIABLES (Settings → Environments → PROD → Variables):
#   AWS_DEFAULT_REGION         — e.g. eu-west-2
#   ECS_SUBNET_IDS             — comma-separated subnet IDs for the ECS task
#   ECS_SECURITY_GROUP_ID      — security group ID for the ECS task
#   ECS_TARGET_GROUP_ARN       — ARN of the ALB target group
#
# These values are only available to jobs that reference 'environment: PROD'
# and have passed the required deployment protection / approval gate.

on:
  push:
    branches:
      - master
    paths:
      - 'infrastructure/**'
  workflow_dispatch:

env:
  AWS_REGION:        ${{ vars.AWS_DEFAULT_REGION }}
  ECR_REPOSITORY:    magicmirror-wallboard
  ECS_CLUSTER:       wallboard-cluster
  ECS_SERVICE:       magicmirror-wallboard
  CONTAINER_NAME:    magicmirror-wallboard

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: PROD
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build \
            --file infrastructure/Dockerfile \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            infrastructure/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Register task definition and create ECS service if it does not exist
        id: ensure-service
        env:
          TASK_DEF_FILE: ${{ steps.task-def.outputs.task-definition }}
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://${TASK_DEF_FILE}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].status' \
            --output text 2>/dev/null)

          if [ "$SERVICE_STATUS" != "ACTIVE" ]; then
            echo "Service not found — creating $ECS_SERVICE"
            # Subnets and security group must match those created by the setup workflow.
            # Set ECS_SUBNET_IDS and ECS_SECURITY_GROUP_ID as repository variables.
            aws ecs create-service \
              --cluster "$ECS_CLUSTER" \
              --service-name "$ECS_SERVICE" \
              --task-definition "$TASK_DEF_ARN" \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={
                subnets=[${{ vars.ECS_SUBNET_IDS }}],
                securityGroups=[${{ vars.ECS_SECURITY_GROUP_ID }}],
                assignPublicIp=ENABLED
              }" \
              --load-balancers "targetGroupArn=${{ vars.ECS_TARGET_GROUP_ARN }},containerName=${CONTAINER_NAME},containerPort=8080" \
              --health-check-grace-period-seconds 60
          else
            echo "Service $ECS_SERVICE already exists — will update in next step"
          fi

      - name: Deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:         ${{ env.ECS_SERVICE }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
