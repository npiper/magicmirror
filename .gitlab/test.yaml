.test_debug:
  stage: test
  variables:
    GIT_STRATEGY: none
    STARTENV: test
  script:
    - $MM_DIR/entrypoint.sh
  extends:
    - .rulenomaster
  environment:
    name: "$CI_COMMIT_BRANCH/Test MagicMirror"

test_debug_node:
  needs: ["build_debug_node"]
  image:
    name: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_BRANCH}_debug${NODE_VERSION_MASTER}
    entrypoint: [""]
  extends:
    - .test_debug

test_debug_node_dev:
  needs: ["build_debug_node_dev"]
  image:
    name: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_BRANCH}_debug${NODE_VERSION_DEVELOP}
    entrypoint: [""]
  extends:
    - .test_debug

test_electron_rebuild:
  stage: test
  variables:
    GIT_STRATEGY: none
  image: nikolaik/python-nodejs:latest
  script:
    - |
      apt-get update
      apt-get install -y build-essential libgtk-3-0 libx11-xcb-dev libnss3-dev libxss1 libxtst6 libasound2 libdrm2 libgbm1 libxshmfence1
      node -v
      python --version
      cat /etc/os-release
      cd
      npm init -y
      npm install electron @electron/rebuild serialport
      npx electron -v --no-sandbox
      echo "electron-rebuild version:"
      npx electron-rebuild --version
      echo "run electron-rebuild:"
      npx electron-rebuild
  rules:
    - if: $TASK == "electronrebuild"
  environment:
    name: "Test Electron rebuild"

snyk_amd64:
  stage: test
  image:
    name: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_BRANCH}_debug${NODE_VERSION_DEVELOP}
    entrypoint: [""]
  script:
    - cd $MM_DIR
    - npm install snyk npm-check-updates
    - npx ncu --deep
    - npx ncu --deep --target minor
    - npx snyk auth ${SNYK_TOKEN}
    - npx snyk test --all-projects
  rules:
    - if: $TASK == "snyk"
  environment:
    name: "$CI_COMMIT_BRANCH/Snyk Security Scan"

# see https://docs.gitlab.com/ee/user/application_security/container_scanning/
# see https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Security/Container-Scanning.gitlab-ci.yml
container_scanning:
  stage: test
  variables:
    CS_IMAGE: karsten13/magicmirror:develop
    CS_DOCKERFILE_PATH: build/Dockerfile-debian
    GIT_STRATEGY: fetch
  rules:
    - if: $TASK == "containerscan"
  environment:
    name: "$CI_COMMIT_BRANCH/Gitlab Security Scan"

triage:
  # Links:
  # https://about.gitlab.com/handbook/marketing/strategic-marketing/getting-started/105/
  # https://medium.com/analytics-vidhya/gitlab-triage-bot-ba8afca4440a
  # https://gitlab.com/gitlab-org/ruby/gems/gitlab-triage/-/blob/master/README.md
  stage: test
  image: ruby:latest
  script:
    - gem install gitlab-triage
    - gitlab-triage --token $TRIAGE_API_TOKEN --source projects --source-id $CI_PROJECT_PATH
  rules:
    - if: $TASK == "triage"
  environment:
    name: "$CI_COMMIT_BRANCH/Triage"

test_install:
  stage: build
  image: docker:cli
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - |
      apk add --no-cache bash jq
      git status
      install/install.sh server
      sleep 5s
      echo "###################################################################"
      ext=0
      state="$(docker ps --filter name=mm --format json | jq -r '.State')"
      if [[ "$state" == "running" ]]; then
        echo "mm container is running"
      else
        echo "mm container not running, state is $state"
        ext=1
      fi
      if docker logs mm | grep ">>>   Ready to go! Please point your browser to: http://0.0.0.0:8080   <<<" > /dev/null; then
        echo "application started"
      else
        echo "application not started"
        ext=1
      fi
      if [[ -f mounts/css/custom.css ]]; then
        echo "custom.css exists and is a file"
      else
        echo "custom.css does not exist or is not a file"
        ext=1
      fi
      if [[ -f mounts/config/config.js ]]; then
        echo "config.js exists and is a file"
      else
        echo "config.js does not exist or is not a file"
        ext=1
      fi
      if [[ -L mounts/modules/default ]]; then
        echo "modules/default exists and is a symlink"
      else
        echo "modules/default does not exist or is not a symlink"
        ext=1
      fi
      owned="$(stat -c '%u:%g' mounts/css/custom.css)"
      if [[ "$owned" == "1000:1000" ]]; then
        echo "custom.css has correct ownership $owned"
      else
        echo "custom.css has wrong ownership $owned"
        ext=1
      fi
      owned="$(stat -c '%u:%g' mounts/config/config.js)"
      if [[ "$owned" == "1000:1000" ]]; then
        echo "config.js has correct ownership $owned"
      else
        echo "config.js has wrong ownership $owned"
        ext=1
      fi
      echo "###################################################################"
      exit $ext
  after_script:
    - |
      cd run
      docker compose down
  rules:
    - if: $TASK == "test_install"
    - if: $TASK == "runtime" && $CI_COMMIT_BRANCH != "master"
      needs: ["build_debian_slim"]

test_spelling:
  stage: build
  image:
    name: jdkato/vale
    entrypoint: [""]
  script:
    - |
      vale sync
      vale .
      res="$(vale --no-exit --output JSON .)"
      # check if json is empty
      [ "$res" = "{}" ] || exit 1
  rules:
    - if: $TASK == "test_spelling"
    - if: $TASK == "runtime"