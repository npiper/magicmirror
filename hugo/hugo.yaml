# Hugo configuration file
title: MagicMirror² Container Setup

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Contact ↗
      url: "https://gitlab.com/khassel/magicmirror"
      weight: 3
    - name: Forum ↗
      url: "https://forum.magicmirror.builders/"
      weight: 4
    - name: Search
      weight: 5
      params:
        type: search
    - name: GitLab
      weight: 6
      url: "https://gitlab.com/khassel/magicmirror"
      params:
        icon: gitlab
    - name: GitHub
      weight: 7
      url: "https://github.com/MagicMirrorOrg/MagicMirror"
      params:
        icon: github

enableGitInfo: true

params:
  externalLinkDecoration: true
  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  navbar:
    displayTitle: true
    displayLogo: true

  footer:
    displayCopyright: true
    displayPoweredBy: true
